openapi: 3.0.0
info:
  title: DevRank API
  description: A comprehensive platform for developers to showcase projects, earn certifications, manage skills, and build professional networks through code reviews and badges.
  version: 1.0.0
  contact:
    name: DevRank Team

servers:
  - url: http://localhost:3000/api
    description: Development server
  - url: https://api.devrank.com
    description: Production server

paths:
  # ======================== USERS ENDPOINTS ========================
  /users:
    get:
      tags:
        - Users
      summary: Get all users
      description: Retrieve a list of all users with their skills and profile information
      responses:
        '200':
          description: List of users retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '500':
          $ref: '#/components/responses/InternalError'

  /users/register:
    post:
      tags:
        - Users
      summary: Register a new user
      description: Create a new user account with email, password, name, role and optional profile information
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterUserRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '409':
          description: User with this email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '400':
          $ref: '#/components/responses/BadRequest'

  /users/name/{name}:
    get:
      tags:
        - Users
      summary: Get user by name
      description: Retrieve a specific user by their username
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Username to search for
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{id}:
    get:
      tags:
        - Users
      summary: Get user by ID
      description: Retrieve a specific user's profile with all details including skills
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
          description: User ID (MongoDB ObjectId)
      responses:
        '200':
          description: User profile retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Users
      summary: Update user profile
      description: Update user information such as name, bio, GitHub URL, or avatar
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
          description: User ID to update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'

    delete:
      tags:
        - Users
      summary: Delete user account
      description: Permanently delete a user and all associated data (projects, reviews, skills)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
          description: User ID to delete
      responses:
        '200':
          description: User deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{id}/skills:
    post:
      tags:
        - Skills
      summary: Add skills to user
      description: Add one or more skills to a user's profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
          description: User ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - skills
              properties:
                skills:
                  type: array
                  items:
                    type: string
                  minItems: 1
                  description: Array of skill names or IDs to add
      responses:
        '200':
          description: Skills added successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
                  count:
                    type: integer
                    description: Number of skills added
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'

    delete:
      tags:
        - Skills
      summary: Remove multiple skills from user
      description: Remove multiple skills from a user's profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
          description: User ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - skills
              properties:
                skills:
                  type: array
                  items:
                    type: string
                  minItems: 1
                  description: Array of skill names or IDs to remove
      responses:
        '200':
          description: Skills removed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
                  count:
                    type: integer
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'

  /users/{id}/skills/{skill}:
    delete:
      tags:
        - Skills
      summary: Remove a single skill from user
      description: Remove a specific skill by ID or name from a user's profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
          description: User ID
        - name: skill
          in: path
          required: true
          schema:
            type: string
          description: Skill ID or name to remove
      responses:
        '200':
          description: Skill removed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
                  count:
                    type: integer
        '404':
          $ref: '#/components/responses/NotFound'

  /users/follow/{targetId}:
    post:
      tags:
        - Users
      summary: Follow a user
      description: Add a user to your following list (start following them)
      parameters:
        - name: targetId
          in: path
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
          description: User ID to follow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
              properties:
                userId:
                  type: string
                  pattern: '^[0-9a-fA-F]{24}$'
                  description: ID of the user performing the follow action
      responses:
        '200':
          description: User followed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Cannot follow yourself or other validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Already following this user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/unfollow/{targetId}:
    post:
      tags:
        - Users
      summary: Unfollow a user
      description: Remove a user from your following list (stop following them)
      parameters:
        - name: targetId
          in: path
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
          description: User ID to unfollow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
              properties:
                userId:
                  type: string
                  pattern: '^[0-9a-fA-F]{24}$'
                  description: ID of the user performing the unfollow action
      responses:
        '200':
          description: User unfollowed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Cannot unfollow yourself
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{userId}/followers:
    get:
      tags:
        - Users
      summary: Get user's followers
      description: Retrieve list of users following this user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
          description: User ID
      responses:
        '200':
          description: Followers list retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  followers:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserProfile'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{userId}/following:
    get:
      tags:
        - Users
      summary: Get users being followed
      description: Retrieve list of users this user is following
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
          description: User ID
      responses:
        '200':
          description: Following list retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  following:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserProfile'
        '404':
          $ref: '#/components/responses/NotFound'

  # ======================== PROJECTS ENDPOINTS ========================
  /projects:
    get:
      tags:
        - Projects
      summary: Get all projects
      description: Retrieve all projects with optional filters
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: ['seeking-review', 'under-review', 'reviewed', 'archived']
          description: Filter by project status
        - name: owner
          in: query
          schema:
            type: string
          description: Filter by owner user ID
        - name: techStack
          in: query
          schema:
            type: array
            items:
              type: string
          description: Filter by technology stack
      responses:
        '200':
          description: List of projects
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'

    post:
      tags:
        - Projects
      summary: Create a new project
      description: Create a new project with title, description, and technical details
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  project:
                    $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/BadRequest'

  /projects/title/{title}:
    get:
      tags:
        - Projects
      summary: Get project by title
      description: Retrieve a specific project by its title
      parameters:
        - name: title
          in: path
          required: true
          schema:
            type: string
          description: Project title
      responses:
        '200':
          description: Project found
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    $ref: '#/components/schemas/Project'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/user/{userId}:
    get:
      tags:
        - Projects
      summary: Get all projects by user
      description: Retrieve all projects owned by a specific user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
          description: User ID (owner)
      responses:
        '200':
          description: User's projects retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /projects/{id}:
    get:
      tags:
        - Projects
      summary: Get project by ID
      description: Retrieve a specific project by its ID with all details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
          description: Project ID
      responses:
        '200':
          description: Project details retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    $ref: '#/components/schemas/Project'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Projects
      summary: Update project
      description: Update project information like title, description, status, or tech stack
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
          description: Project ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Project updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  project:
                    $ref: '#/components/schemas/Project'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'

    delete:
      tags:
        - Projects
      summary: Delete project
      description: Permanently delete a project and all associated reviews
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
          description: Project ID
      responses:
        '200':
          description: Project deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{id}/reviews:
    get:
      tags:
        - Reviews
      summary: Get reviews for a project
      description: Retrieve all reviews submitted for a specific project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
          description: Project ID
      responses:
        '200':
          description: Project reviews retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Review'
        '404':
          $ref: '#/components/responses/NotFound'

  # ======================== REVIEWS ENDPOINTS ========================
  /reviews:
    get:
      tags:
        - Reviews
      summary: Get all reviews
      description: Retrieve all reviews with optional filtering
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: ['published', 'removed']
          description: Filter by review status
      responses:
        '200':
          description: List of reviews
          content:
            application/json:
              schema:
                type: object
                properties:
                  reviews:
                    type: array
                    items:
                      $ref: '#/components/schemas/Review'

    post:
      tags:
        - Reviews
      summary: Create a review
      description: Submit a review for a project with ratings and feedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewRequest'
      responses:
        '201':
          description: Review created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  review:
                    $ref: '#/components/schemas/Review'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /reviews/{id}:
    get:
      tags:
        - Reviews
      summary: Get review by ID
      description: Retrieve a specific review by its ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
          description: Review ID
      responses:
        '200':
          description: Review retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  review:
                    $ref: '#/components/schemas/Review'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Reviews
      summary: Update review
      description: Update review ratings or feedback
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
          description: Review ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReviewRequest'
      responses:
        '200':
          description: Review updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  review:
                    $ref: '#/components/schemas/Review'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'

    delete:
      tags:
        - Reviews
      summary: Delete review
      description: Remove a review from a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
          description: Review ID
      responses:
        '200':
          description: Review deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'

  # ======================== SKILLS ENDPOINTS ========================
  /skills:
    get:
      tags:
        - Skills
      summary: Get all skills
      description: Retrieve all available skills with optional filtering
      parameters:
        - name: category
          in: query
          schema:
            type: array
            items:
              type: string
              enum: ['frontend', 'backend', 'devops', 'database', 'mobile', 'other']
          description: Filter by skill category
      responses:
        '200':
          description: List of skills
          content:
            application/json:
              schema:
                type: object
                properties:
                  skills:
                    type: array
                    items:
                      $ref: '#/components/schemas/Skill'

    post:
      tags:
        - Skills
      summary: Create a new skill
      description: Create a new skill that users can add to their profiles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSkillRequest'
      responses:
        '201':
          description: Skill created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  skill:
                    $ref: '#/components/schemas/Skill'
        '400':
          $ref: '#/components/responses/BadRequest'

  /skills/name/{name}:
    get:
      tags:
        - Skills
      summary: Get skill by name
      description: Retrieve a specific skill by its name
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Skill name
      responses:
        '200':
          description: Skill found
          content:
            application/json:
              schema:
                type: object
                properties:
                  skill:
                    $ref: '#/components/schemas/Skill'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Skills
      summary: Update skill by name
      description: Update skill information by its name
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Skill name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSkillRequest'
      responses:
        '200':
          description: Skill updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  skill:
                    $ref: '#/components/schemas/Skill'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'

    delete:
      tags:
        - Skills
      summary: Delete skill by name
      description: Remove a skill by its name from the system
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Skill name
      responses:
        '200':
          description: Skill deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /skills/{id}:
    get:
      tags:
        - Skills
      summary: Get skill by ID
      description: Retrieve a specific skill by its ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
          description: Skill ID
      responses:
        '200':
          description: Skill found
          content:
            application/json:
              schema:
                type: object
                properties:
                  skill:
                    $ref: '#/components/schemas/Skill'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Skills
      summary: Update skill by ID
      description: Update skill information by its ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
          description: Skill ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSkillRequest'
      responses:
        '200':
          description: Skill updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  skill:
                    $ref: '#/components/schemas/Skill'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'

    delete:
      tags:
        - Skills
      summary: Delete skill by ID
      description: Remove a skill by its ID from the system
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
          description: Skill ID
      responses:
        '200':
          description: Skill deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'

  # ======================== CERTIFICATIONS ENDPOINTS ========================
  /certifications:
    get:
      tags:
        - Certifications
      summary: Get all certification requests
      description: Retrieve all certification requests with their current status
      responses:
        '200':
          description: List of certification requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  requests:
                    type: array
                    items:
                      $ref: '#/components/schemas/CertificationRequest'

  /certifications/apply:
    post:
      tags:
        - Certifications
      summary: Apply for certification
      description: Submit a certification application with CV, experience, and technical expertise
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplyCertificationRequest'
      responses:
        '201':
          description: Certification application submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  request:
                    $ref: '#/components/schemas/CertificationRequest'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /certifications/{id}/approve:
    patch:
