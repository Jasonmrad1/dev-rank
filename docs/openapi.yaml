            type: string
          description: User ID
      responses:
        '200':
          description: User's activity logs retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ActivityLog'

  /logs/entity/{entity}:
    get:
      tags:
        - Activity Logs
      summary: Get logs by entity type
      description: Retrieve logs for a specific entity type
      parameters:
        - name: entity
          in: path
          required: true
          schema:
            type: string
            enum: ['User', 'Project', 'Review', 'Skill', 'Badge', 'Certification']
          description: Entity type
      responses:
        '200':
          description: Entity logs retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ActivityLog'

  /logs/entity/{entity}/{entityId}:
    get:
      tags:
        - Activity Logs
      summary: Get logs for specific entity record
      description: Retrieve logs for a specific entity record
      parameters:
        - name: entity
          in: path
          required: true
          schema:
            type: string
            enum: ['User', 'Project', 'Review', 'Skill', 'Badge', 'Certification']
          description: Entity type
        - name: entityId
          in: path
          required: true
          schema:
            type: string
          description: Entity ID
      responses:
        '200':
          description: Entity record logs retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ActivityLog'

  /logs/old:
    delete:
      tags:
        - Activity Logs
      summary: Delete old logs
      description: Delete activity logs before a specific date
      parameters:
        - name: beforeDate
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Delete logs before this date (YYYY-MM-DD)
      responses:
        '200':
          description: Old logs deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

components:
  schemas:
    # ======================== USER SCHEMAS ========================
    User:
      type: object
      required:
        - _id
        - name
        - email
        - role
      properties:
        _id:
          type: string
          format: mongodb-objectid
          description: Unique user identifier
        name:
          type: string
          description: User's full name
        email:
          type: string
          format: email
          description: User's email address
        role:
          type: string
          enum: ['developer', 'reviewer', 'admin']
          description: User's role in the system
        bio:
          type: string
          description: User's biography
        githubUrl:
          type: string
          format: uri
          description: User's GitHub profile URL
        avatarUrl:
          type: string
          format: uri
          description: URL to user's avatar image
        isVerifiedReviewer:
          type: boolean
          description: Whether user is a verified reviewer
        reviewerStatus:
          type: string
          enum: ['none', 'pending', 'approved', 'rejected']
          description: Status of reviewer certification
        skills:
          type: array
          items:
            $ref: '#/components/schemas/Skill'
          description: Skills the user has
        badges:
          type: array
          items:
            $ref: '#/components/schemas/Badge'
          description: Badges earned by the user
        profileScore:
          type: number
          format: float
          description: User's profile score based on project ratings
        followers:
          type: array
          items:
            type: string
          description: IDs of users following this user
        following:
          type: array
          items:
            type: string
          description: IDs of users this user is following
        joinedAt:
          type: string
          format: date-time
          description: Account creation timestamp

    UserProfile:
      type: object
      description: Minimal user information for references
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        avatarUrl:
          type: string
        githubUrl:
          type: string

    RegisterUserRequest:
      type: object
      required:
        - name
        - email
        - password
        - role
      properties:
        name:
          type: string
          minLength: 1
          description: User's full name
        email:
          type: string
          format: email
          description: User's email address
        password:
          type: string
          minLength: 6
          description: User's password
        role:
          type: string
          enum: ['developer', 'reviewer', 'admin']
          description: User's role
        bio:
          type: string
          description: Optional user biography
        githubUrl:
          type: string
          format: uri
          description: Optional GitHub profile URL
        avatarUrl:
          type: string
          format: uri
          description: Optional avatar image URL

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
          description: Updated name
        bio:
          type: string
          description: Updated biography
        githubUrl:
          type: string
          format: uri
          description: Updated GitHub URL
        avatarUrl:
          type: string
          format: uri
          description: Updated avatar URL

    # ======================== PROJECT SCHEMAS ========================
    Project:
      type: object
      required:
        - _id
        - title
        - owner
      properties:
        _id:
          type: string
          format: mongodb-objectid
        title:
          type: string
          description: Project title
        description:
          type: string
          description: Detailed project description
        owner:
          $ref: '#/components/schemas/UserProfile'
          description: Project owner
        repoUrl:
          type: string
          format: uri
          description: Repository URL (GitHub, GitLab, etc.)
        liveUrl:
          type: string
          format: uri
          description: Live demo URL
        techStack:
          type: array
          items:
            type: string
          description: Technologies used
        status:
          type: string
          enum: ['seeking-review', 'under-review', 'reviewed', 'archived']
          description: Current project status
        aggregateRating:
          type: number
          format: float
          description: Average rating from all reviews
        aggregateCodeQuality:
          type: number
          format: float
          description: Average code quality score
        aggregateCreativity:
          type: number
          format: float
          description: Average creativity score
        aggregateCleanCode:
          type: number
          format: float
          description: Average clean code score
        totalReviews:
          type: integer
          description: Number of reviews received
        hireVotes:
          type: integer
          description: Number of "would hire" votes
        createdAt:
          type: string
          format: date-time
          description: Project creation timestamp

    CreateProjectRequest:
      type: object
      required:
        - title
        - owner
      properties:
        title:
          type: string
          minLength: 1
          description: Project title
        description:
          type: string
          description: Project description
        owner:
          type: string
          pattern: '^[0-9a-fA-F]{24}$'
          description: Owner user ID
        repoUrl:
          type: string
          format: uri
          description: Repository URL
        liveUrl:
          type: string
          format: uri
          description: Live demo URL
        techStack:
          type: array
          items:
            type: string
          description: Technologies used
        status:
          type: string
          enum: ['seeking-review', 'under-review', 'reviewed', 'archived']
          default: 'seeking-review'

    UpdateProjectRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        repoUrl:
          type: string
          format: uri
        liveUrl:
          type: string
          format: uri
        techStack:
          type: array
          items:
            type: string
        status:
          type: string
          enum: ['seeking-review', 'under-review', 'reviewed', 'archived']

    # ======================== REVIEW SCHEMAS ========================
    Review:
      type: object
      required:
        - _id
        - project
        - reviewer
        - overallRating
      properties:
        _id:
          type: string
          format: mongodb-objectid
        project:
          type: object
          properties:
            _id:
              type: string
            title:
              type: string
        reviewer:
          $ref: '#/components/schemas/UserProfile'
        overallRating:
          type: integer
          minimum: 1
          maximum: 5
          description: Overall rating (1-5)
        codeQualityScore:
          type: integer
          minimum: 1
          maximum: 5
          description: Code quality rating
        creativityScore:
          type: integer
          minimum: 1
          maximum: 5
          description: Creativity rating
        cleanCodeScore:
          type: integer
          minimum: 1
          maximum: 5
          description: Clean code rating
        wouldHire:
          type: boolean
          description: Would the reviewer hire the developer?
        generalFeedback:
          type: string
          description: General feedback on the project
        suggestions:
          type: array
          items:
            type: string
          description: Improvement suggestions
        status:
          type: string
          enum: ['published', 'removed']
          description: Review publication status
        createdAt:
          type: string
          format: date-time

    CreateReviewRequest:
      type: object
      required:
        - project
        - reviewer
        - overallRating
        - codeQualityScore
        - creativityScore
        - cleanCodeScore
      properties:
        project:
          type: string
          pattern: '^[0-9a-fA-F]{24}$'
          description: Project ID being reviewed
        reviewer:
          type: string
          pattern: '^[0-9a-fA-F]{24}$'
          description: Reviewer user ID
        overallRating:
          type: integer
          minimum: 1
          maximum: 5
        codeQualityScore:
          type: integer
          minimum: 1
          maximum: 5
        creativityScore:
          type: integer
          minimum: 1
          maximum: 5
        cleanCodeScore:
          type: integer
          minimum: 1
          maximum: 5
        wouldHire:
          type: boolean
        generalFeedback:
          type: string
        suggestions:
          type: array
          items:
            type: string

    UpdateReviewRequest:
      type: object
      properties:
        overallRating:
          type: integer
          minimum: 1
          maximum: 5
        codeQualityScore:
          type: integer
          minimum: 1
          maximum: 5
        creativityScore:
          type: integer
          minimum: 1
          maximum: 5
        cleanCodeScore:
          type: integer
          minimum: 1
          maximum: 5
        wouldHire:
          type: boolean
        generalFeedback:
          type: string
        suggestions:
          type: array
          items:
            type: string
        status:
          type: string
          enum: ['published', 'removed']

    # ======================== SKILL SCHEMAS ========================
    Skill:
      type: object
      required:
        - _id
        - name
        - category
      properties:
        _id:
          type: string
          format: mongodb-objectid
        name:
          type: string
          unique: true
          description: Skill name
        category:
          type: array
          items:
            type: string
            enum: ['frontend', 'backend', 'devops', 'database', 'mobile', 'other']
          minItems: 1
          description: Skill categories
        isPreset:
          type: boolean
          description: Whether this is a preset skill
        users:
          type: array
          items:
            type: string
          description: User IDs who have this skill

    CreateSkillRequest:
      type: object
      required:
        - name
        - category
      properties:
        name:
          type: string
          minLength: 1
          description: Skill name
        category:
          type: array
          items:
            type: string
            enum: ['frontend', 'backend', 'devops', 'database', 'mobile', 'other']
          minItems: 1
          description: Skill categories

    UpdateSkillRequest:
      type: object
      properties:
        name:
          type: string
        category:
          type: array
          items:
            type: string
            enum: ['frontend', 'backend', 'devops', 'database', 'mobile', 'other']
          minItems: 1

    # ======================== CERTIFICATION SCHEMAS ========================
    CertificationRequest:
      type: object
      required:
        - _id
        - user
        - status
      properties:
        _id:
          type: string
          format: mongodb-objectid
        user:
          type: string
          format: mongodb-objectid
          description: User applying for certification
        cvUrl:
          type: string
          format: uri
          description: URL to CV/resume
        experience:
          type: string
          description: Years or description of experience
        motivation:
          type: string
          description: Why user wants certification
        techExpertise:
          type: array
          items:
            type: string
          description: Technical expertise areas
        status:
          type: string
          enum: ['pending', 'approved', 'rejected']
          description: Application status
        adminNotes:
          type: string
          description: Admin review notes
        submittedAt:
          type: string
          format: date-time
        reviewedAt:
          type: string
          format: date-time
          description: When admin reviewed the application

    ApplyCertificationRequest:
      type: object
      required:
        - user
      properties:
        user:
          type: string
          pattern: '^[0-9a-fA-F]{24}$'
          description: User ID applying
        cvUrl:
          type: string
          format: uri
        experience:
          type: string
        motivation:
          type: string
        techExpertise:
          type: array
          items:
            type: string

    # ======================== BADGE SCHEMAS ========================
    Badge:
      type: object
      required:
        - _id
        - name
        - description
      properties:
        _id:
          type: string
          format: mongodb-objectid
        name:
          type: string
          unique: true
          description: Badge name
        description:
          type: string
          description: Badge description
        icon:
          type: string
          description: Badge icon (URL or emoji)
        category:
          type: string
          enum: ['achievement', 'skill-master', 'reviewer', 'contributor', 'other']
          description: Badge category
        criteria:
          type: string
          description: Criteria for earning the badge
        isActive:
          type: boolean
          description: Whether badge is currently active
        users:
          type: array
          items:
            type: string
          description: User IDs who have earned this badge
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateBadgeRequest:
      type: object
      required:
        - name
        - description
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        icon:
          type: string
        category:
          type: string
          enum: ['achievement', 'skill-master', 'reviewer', 'contributor', 'other']
          default: 'achievement'
        criteria:
          type: string
        isActive:
          type: boolean
          default: true

    UpdateBadgeRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        icon:
          type: string
        category:
          type: string
          enum: ['achievement', 'skill-master', 'reviewer', 'contributor', 'other']
        criteria:
          type: string
        isActive:
          type: boolean

    # ======================== ACTIVITY LOG SCHEMA ========================
    ActivityLog:
      type: object
      required:
        - id
        - action
        - entity
      properties:
        id:
          type: integer
          description: Log record ID
        userId:
          type: string
          description: User who performed the action
        action:
          type: string
          description: Action performed (e.g., USER_CREATED, PROJECT_UPDATED)
        entity:
          type: string
          enum: ['User', 'Project', 'Review', 'Skill', 'Badge', 'Certification']
          description: Entity type affected
        entityId:
          type: string
          description: ID of the affected entity
        metadata:
          type: object
          description: Additional metadata about the action
        timestamp:
          type: string
          format: date-time
          description: When the action occurred

    # ======================== ERROR SCHEMA ========================
    Error:
      type: object
      required:
        - message
        - statusCode
      properties:
        message:
          type: string
          description: Error message
        statusCode:
          type: integer
          description: HTTP status code
        errorCode:
          type: string
          description: Application-specific error code

  responses:
    BadRequest:
      description: Invalid request format or validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

tags:
  - name: Users
    description: User management, registration, and social features
  - name: Projects
    description: Project CRUD operations and management
  - name: Reviews
    description: Project reviews and code feedback
  - name: Skills
    description: Skill management and user skill assignments
  - name: Certifications
    description: Certification applications and approvals
  - name: Badges
    description: Badge management and user achievements
  - name: Activity Logs
    description: System audit logs and activity tracking
