    delete:
      tags:
        - Badges
      summary: Delete badge by ID
      description: Remove a badge by its ID from the system
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
          description: Badge ID
      responses:
        '200':
          description: Badge deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
